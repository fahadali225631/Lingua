<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGen // Free AI Image Generator</title>
    <style>
        :root {
            --bg-black: #09090b;
            --card-black: #141416;
            --primary-green: #00ff66;
            --dark-green: #0b5126;
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
            --border-gray: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        header h1 span {
            color: var(--primary-green);
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }

        header p {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .main-card {
            background-color: var(--card-black);
            border: 1px solid var(--border-gray);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: var(--bg-black);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-white);
            padding: 12px;
            font-size: 1rem;
            resize: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        select {
            width: 100%;
            background-color: var(--bg-black);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-white);
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        .btn-generate {
            width: 100%;
            background-color: var(--primary-green);
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate:hover {
            background-color: #00dd55;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .output-box {
            margin-top: 24px;
            border: 1px dashed var(--border-gray);
            border-radius: 12px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .placeholder-text {
            color: var(--text-gray);
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }

        #result-image {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: none;
            border-radius: 11px;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 255, 102, 0.1);
            border-left-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .loader-text {
            color: var(--primary-green);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .action-buttons {
            display: none;
            width: 100%;
            margin-top: 16px;
        }

        .btn-download {
            width: 100%;
            background-color: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .btn-download:hover {
            background-color: rgba(0, 255, 102, 0.05);
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px 0;
            font-size: 0.8rem;
            color: var(--text-gray);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Aura<span>Gen</span></h1>
            <p>Client-side decentralized AI image generation framework.</p>
        </header>

        <main class="main-card">
            <div class="input-group">
                <label for="prompt">Image Prompt</label>
                <textarea id="prompt" placeholder="A futuristic cyberpunk city streets, neon green lights, ultra realistic, 8k resolution..."></textarea>
            </div>

            <div class="settings-grid">
                <div class="input-group">
                    <label for="aspect-ratio">Aspect Ratio</label>
                    <select id="aspect-ratio">
                        <option value="1:1">1:1 (Square)</option>
                        <option value="16:9">16:9 (Landscape)</option>
                        <option value="9:16">9:16 (Portrait)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="enhance">Style Filter</label>
                    <select id="enhance">
                        <option value="cinematic">Cinematic</option>
                        <option value="anime">Anime / Manga</option>
                        <option value="digital-art">Digital Art</option>
                        <option value="photography">Photorealistic</option>
                    </select>
                </div>
            </div>

            <button id="generate-btn" class="btn-generate">
                <span>Generate Engine</span>
            </button>

            <div class="output-box" id="output-box">
                <div class="placeholder-text" id="placeholder">
                    Your generated visual matrix will manifest here.
                </div>
                
                <div class="loader-container" id="loader-container">
                    <div class="loader"></div>
                    <div class="loader-text">Rendering pixels locally...</div>
                </div>

                <img id="result-image" alt="Generated AI Visual">
            </div>

            <div class="action-buttons" id="action-buttons">
                <button id="download-btn" class="btn-download">Save Image to Device</button>
            </div>
        </main>

        <footer>
            &copy; 2026 AuraGen Framework. Powered by client-side browser delivery.
        </footer>
    </div>

    <script>
        document.getElementById('generate-btn').addEventListener('click', () => {
            const promptInput = document.getElementById('prompt').value.trim();
            const aspectRatio = document.getElementById('aspect-ratio').value;
            const styleFilter = document.getElementById('enhance').value;
            
            const placeholder = document.getElementById('placeholder');
            const loaderContainer = document.getElementById('loader-container');
            const resultImage = document.getElementById('result-image');
            const actionButtons = document.getElementById('action-buttons');
            const generateBtn = document.getElementById('generate-btn');

            if (!promptInput) {
                alert('Please enter a description prompt first.');
                return;
            }

            // Reset UI state to loading sequence
            placeholder.style.display = 'none';
            resultImage.style.display = 'none';
            actionButtons.style.display = 'none';
            loaderContainer.style.display = 'flex';
            generateBtn.disabled = true;
            generateBtn.style.opacity = '0.5';

            // Establish Dimensions mapping
            let width = 1024;
            let height = 1024;
            if (aspectRatio === '16:9') { width = 1280; height = 720; }
            if (aspectRatio === '9:16') { width = 720; height = 1280; }

            // Refine prompt based on style filter selection
            let finalPrompt = promptInput;
            if (styleFilter === 'cinematic') finalPrompt += ", cinematic lighting, dramatic atmosphere, detailed texture, 8k";
            if (styleFilter === 'anime') finalPrompt += ", vibrant anime style, detailed line art, macro studio lighting";
            if (styleFilter === 'digital-art') finalPrompt += ", concept art, smooth digital painting, trending on artstation";
            if (styleFilter === 'photography') finalPrompt += ", professional award-winning photography, hyper-realistic, 35mm lens, sharp focus";

            // Universal parameters configuration
            const seed = Math.floor(Math.random() * 1000000);
            const encodedPrompt = encodeURIComponent(finalPrompt);
            const imageUrl = `https://image.pollinations.ai/p/${encodedPrompt}?width=${width}&height=${height}&seed=${seed}&nologo=true`;

            // Bind listeners directly to the DOM element BEFORE assigning src to avoid racing issues
            resultImage.onload = () => {
                loaderContainer.style.display = 'none';
                resultImage.style.display = 'block';
                actionButtons.style.display = 'block';
                
                generateBtn.disabled = false;
                generateBtn.style.opacity = '1';
            };

            resultImage.onerror = () => {
                // Secondary backup network route execution if DNS or regional routing fails
                console.warn("Primary endpoint blocked or busy. Engaging backup CDN pipeline...");
                const fallbackUrl = `https://pollinations.ai/p/${encodedPrompt}?width=${width}&height=${height}&seed=${seed}&nologo=true`;
                
                resultImage.onload = () => {
                    loaderContainer.style.display = 'none';
                    resultImage.style.display = 'block';
                    actionButtons.style.display = 'block';
                    generateBtn.disabled = false;
                    generateBtn.style.opacity = '1';
                };
                
                resultImage.onerror = () => {
                    loaderContainer.style.display = 'none';
                    placeholder.style.display = 'block';
                    placeholder.innerText = 'Unable to connect to the generation stream. Please check your internet connection or try a different prompt.';
                    generateBtn.disabled = false;
                    generateBtn.style.opacity = '1';
                };
                
                resultImage.src = fallbackUrl;
            };

            // Fire pure native browser stream source assignment (bypasses restrictive client-side CORS checking)
            resultImage.src = imageUrl;
        });

        // Safe Client-Side Binary Blob Downloader with Sandbox Fallback
        document.getElementById('download-btn').addEventListener('click', async () => {
            const resultImage = document.getElementById('result-image');
            if (!resultImage.src) return;

            const downloadBtn = document.getElementById('download-btn');
            const originalText = downloadBtn.innerText;
            downloadBtn.innerText = 'Downloading...';
            downloadBtn.style.opacity = '0.7';

            try {
                const response = await fetch(resultImage.src);
                if (!response.ok) throw new Error("Network download block encountered");
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `auragen-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                setTimeout(() => window.URL.revokeObjectURL(blobUrl), 150);
            } catch (error) {
                console.warn("Direct download stream restricted by browser sandbox. Engaging secondary safe tab window stream layout...", error);
                // Fallback for sandboxed mobile views: opens directly so user can hold down to save/copy
                window.open(resultImage.src, '_blank');
            } finally {
                downloadBtn.innerText = originalText;
                downloadBtn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
